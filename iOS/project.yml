name: Rowlog
options:
  bundleIdPrefix: com.shimondeitel.rowlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Rowlog:
    type: application
    platform: iOS
    sources:
      - path: Rowlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rowlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rowlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RowlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RowlogTests
      - path: Rowlog.storekit
    dependencies:
      - target: Rowlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rowlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RowlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RowlogUITests
    dependencies:
      - target: Rowlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rowlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Rowlog:
    build:
      targets:
        Rowlog: all
        RowlogTests: [test]
        RowlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Rowlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Rowlog.storekit
      targets:
        - RowlogTests
        - RowlogUITests
    archive:
      config: Release
